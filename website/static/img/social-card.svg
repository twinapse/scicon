<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SciCon social card</title>
  <desc id="desc">A social preview card for the SciCon documentation site.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#061429"/>
      <stop offset="100%" stop-color="#0a1b36"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#7df9ff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#7df9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#4bb8ff" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#4bb8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="40" fill="url(#glowA)"/>
  <rect width="1200" height="630" rx="40" fill="url(#glowB)"/>
  <rect x="24" y="24" width="1152" height="582" rx="30" fill="none" stroke="#244a65" stroke-width="2"/>
  <g transform="translate(82 78)">
    <rect x="0" y="0" width="148" height="148" rx="34" fill="#061429" stroke="#244a65" stroke-width="3"/>
    <path d="M38 101V47l36-22 36 22v54l-36 22-36-22Z" fill="none" stroke="#7df9ff" stroke-linejoin="round" stroke-width="7"/>
    <path d="M74 40v40" stroke="#4bb8ff" stroke-linecap="round" stroke-width="8"/>
    <circle cx="74" cy="58" r="16" fill="#43ffb5"/>
  </g>
  <text x="272" y="182" fill="#eaf7fb" font-family="Montserrat, system-ui, sans-serif" font-size="86" font-weight="700">
