name: Code quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  format-and-lint:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install development dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Show tool versions
      run: |
        python -m pip freeze | grep -E '^(isort|pylint|ruff|yapf)=='

    - name: Collect Python paths
      id: python_paths
      run: |
        paths=()
        for path in scicon tests .codex/hooks; do
          if [ -e "$path" ]; then
            paths+=("$path")
          fi
        done

        if [ ${#paths[@]} -eq 0 ]; then
          echo "paths=" >> "$GITHUB_OUTPUT"
        else
          echo "paths=${paths[*]}" >> "$GITHUB_OUTPUT"
        fi

    - name: Sort imports with isort (Google style)
      if: steps.python_paths.outputs.paths != ''
      env:
        MAX_LINE_LENGTH: 88
      run: |
        read -r -a PYTHON_PATHS <<< "${{ steps.python_paths.outputs.paths }}"
        isort "${PYTHON_PATHS[@]}" --profile google --line-length "${{ env.MAX_LINE_LENGTH }}"

    - name: Check code format with YAPF (Google style)
      if: steps.python_paths.outputs.paths != ''
      run: |
        read -r -a PYTHON_PATHS <<< "${{ steps.python_paths.outputs.paths }}"
        DIFF_OUTPUT=$(yapf --recursive --diff "${PYTHON_PATHS[@]}")
        if [ -n "$DIFF_OUTPUT" ]; then
          echo "Formatting issues found:"
          echo "$DIFF_OUTPUT"
          exit 1
        fi

    - name: Lint code with Ruff (fast analysis)
      if: steps.python_paths.outputs.paths != ''
      run: |
        read -r -a PYTHON_PATHS <<< "${{ steps.python_paths.outputs.paths }}"
        ruff check "${PYTHON_PATHS[@]}"

    - name: Lint package with Pylint (exhaustive analysis)
      if: hashFiles('scicon/**/*.py') != ''
      run: pylint --verbose --rcfile=pylintrc scicon

    - name: Lint tests with Pylint (exhaustive analysis)
      if: hashFiles('tests/**/*.py') != ''
      run: pylint --verbose --rcfile=pylintrc --disable=redefined-outer-name,unused-argument,protected-access tests
